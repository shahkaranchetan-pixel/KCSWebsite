<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0B1D3A"/>
  <!-- Gold accent bar left -->
  <rect x="0" y="0" width="8" height="630" fill="#C9A84C"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0L0 0 0 60" fill="none" stroke="#C9A84C" stroke-width="0.15" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Gold decorative line -->
  <line x1="80" y1="160" x2="1120" y2="160" stroke="#C9A84C" stroke-width="1.5" opacity="0.35"/>
  <line x1="80" y1="470" x2="1120" y2="470" stroke="#C9A84C" stroke-width="1.5" opacity="0.35"/>
  <!-- Firm name -->
  <text x="600" y="280" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">KC Shah &amp; Associates</text>
  <!-- Gold underline accent -->
  <rect x="480" y="298" width="240" height="4" rx="2" fill="#C9A84C"/>
  <!-- Tagline -->
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="32" fill="#C9A84C" text-anchor="middle" letter-spacing="3" font-weight="400">CHARTERED ACCOUNTANTS</text>
  <!-- Location + credentials -->
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.65)" text-anchor="middle" letter-spacing="1">Mumbai · ICAI · IBBI Registered Valuer · CFA</text>
  <!-- Website -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="20" fill="rgba(201,168,76,0.7)" text-anchor="middle" letter-spacing="2">kcshah.com</text>
</svg>
