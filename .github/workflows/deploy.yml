name: Deploy to Hostinger

on:
  push:
    branches:
      - main  # Runs automatically on every push to main

jobs:
  deploy:
    name: Upload to Hostinger via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          
          # Upload to your Hostinger public_html folder
          server-dir: ./
          
          # Only upload files from the repo root (your site files)
          local-dir: ./
          
          # Exclude development/private files — never uploaded to server
          exclude: |
            **/.git*
            **/.git*/**
            **/scratch/**
            **/dev_scripts/**
            **/blog-post-template.html
            **/.claude/**
            **/node_modules/**
            **/*.zip
            **/parse_table.py
            **/tds.pdf
            **/tds_parsed.txt
